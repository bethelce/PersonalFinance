// ── STATEMENT PERIOD ENGINE ─────────────────────────────────────────────────
// A CC statement period runs from (prevCutOff+1) to (cutOffDay) of each month.
// Example: cutOffDay=5
//   Statement closing Mar 5  → covers Feb 6 - Mar 5  → due ~Mar 25
//   Statement closing Apr 5  → covers Mar 6 - Apr 5  → due ~Apr 25
//
// For a given CC and a given statement (identified by its closing date year+month+cutOffDay),
// return all transactions that fall within that statement window.

function getStatementWindow(cc, closeYear, closeMonth) {
  // Statement closes on closeYear/closeMonth/cutOffDay
  // Statement opens on (closeMonth-1)/cutOffDay+1 (prior month, day after previous cutoff)
  const cutOff = Number(cc.cutOffDay);
  const closeDate = new Date(closeYear, closeMonth, cutOff);
  // Previous cutoff: one month earlier
  const prevCloseDate = new Date(closeYear, closeMonth - 1, cutOff);
  // Window: day after prev cutoff → close date (inclusive)
  const windowStart = new Date(prevCloseDate.getFullYear(), prevCloseDate.getMonth(), prevCloseDate.getDate() + 1);
  const windowEnd   = closeDate;
  return { windowStart, windowEnd, closeDate };
}

// Due date for a statement closing on closeYear/closeMonth
function getStatementDueDate(cc, closeYear, closeMonth) {
  const cutOff  = Number(cc.cutOffDay);
  const dueDay  = Number(cc.dueDay);
  // If dueDay > cutOffDay, due is same month as close; else due is next month
  let dueMonth = closeMonth;
  let dueYear  = closeYear;
  if (dueDay <= cutOff) { dueMonth++; if(dueMonth>11){dueMonth=0;dueYear++;} }
  return new Date(dueYear, dueMonth, dueDay);
}

// Get statement balance: sum of all CC charges in the window
function getStatementBalance(cc, closeYear, closeMonth, transactions) {
  const { windowStart, windowEnd } = getStatementWindow(cc, closeYear, closeMonth);
  return transactions
    .filter(t => {
      if (!t.isCC || t.ccId !== cc.id) return false;
      const d = new Date(t.date);
      return d >= windowStart && d <= windowEnd;
    })
    .reduce((s, t) => s + Number(t.amount), 0);
}

// Get current (open) period balance: charges AFTER the last closing date up to today
function getCurrentPeriodBalance(cc, transactions) {
  const cutOff = Number(cc.cutOffDay);
  const now    = TODAY;
  // Last closing date: this month's cutoff if today > cutoff, else last month's
  let closeMonth = now.getMonth();
  let closeYear  = now.getFullYear();
  if (now.getDate() <= cutOff) { closeMonth--; if(closeMonth<0){closeMonth=11;closeYear--;} }
  const lastClose = new Date(closeYear, closeMonth, cutOff);
  const periodStart = new Date(lastClose.getFullYear(), lastClose.getMonth(), lastClose.getDate() + 1);
  return transactions
    .filter(t => {
      if (!t.isCC || t.ccId !== cc.id) return false;
      const d = new Date(t.date);
      return d > lastClose;
    })
    .reduce((s, t) => s + Number(t.amount), 0);
}

// Build list of upcoming statements that have a due date in the future (not yet paid)
// Returns array of { cc, closeYear, closeMonth, statementBal, dueDate, key, paid }
function getUpcomingStatements(allCCs, transactions, paidStatements, monthsAhead=3) {
  const results = [];
  const now = TODAY;
  for (const cc of allCCs) {
    // Check statements for the past 2 months through next 2 months
    for (let delta = -2; delta <= monthsAhead; delta++) {
      let m = now.getMonth() + delta;
      let y = now.getFullYear();
      while (m < 0)  { m += 12; y--; }
      while (m > 11) { m -= 12; y++; }
      const bal = getStatementBalance(cc, y, m, transactions);
      if (bal <= 0) continue;
      const dueDate = getStatementDueDate(cc, y, m);
      const key = `${cc.id}_${y}_${m}`;
      const paid = !!(paidStatements && paidStatements[key]);
      if (!paid) {
        results.push({ cc, closeYear: y, closeMonth: m, statementBal: bal, dueDate, key });
      }
    }
  }
  // Sort by due date
  results.sort((a, b) => a.dueDate - b.dueDate);
  return results;
}

// Get all statements (including paid) for a specific CC
function getCCStatements(cc, transactions, paidStatements, monthsRange=6) {
  const results = [];
  const now = TODAY;
  for (let delta = -(monthsRange); delta <= 2; delta++) {
    let m = now.getMonth() + delta;
    let y = now.getFullYear();
    while (m < 0)  { m += 12; y--; }
    while (m > 11) { m -= 12; y++; }
    const bal = getStatementBalance(cc, y, m, transactions);
    if (bal <= 0) continue;
    const dueDate = getStatementDueDate(cc, y, m);
    const key = `${cc.id}_${y}_${m}`;
    const paid = !!(paidStatements && paidStatements[key]);
    const { windowStart, windowEnd } = getStatementWindow(cc, y, m);
    results.push({ closeYear: y, closeMonth: m, statementBal: bal, dueDate, key, paid, windowStart, windowEnd });
  }
  results.sort((a, b) => b.dueDate - a.dueDate);
  return results;
}

const load=()=>{
  try{const s=localStorage.getItem("kwartako_v4");if(s)return JSON.parse(s);}catch{}

    setupDone:false, transactions:[], bills:DEF_BILLS, creditCards:DEF_CC,
    rentalProperties:[{id:"r1",name:"Property 1",amount:""}],
    paidStatements:{}, // key: "ccId_year_month" → true
  };
};

function App(){

  const[selMonth,setSelMonth]=useState(TODAY.getMonth());
  const[selYear,setSelYear]=useState(TODAY.getFullYear());
  const[aiAdvice,setAiAdvice]=useState("");
  const[aiLoading,setAiLoading]=useState(false);
  const[showAI,setShowAI]=useState(false);
  const[form,setForm]=useState({date:TODAY.toISOString().split("T")[0],amount:"",description:"",category:"food",type:"expense",ccId:"",isCC:false,incomeCategory:"salary",propertyId:""});

  const totInc=incs.reduce((s,t)=>s+Number(t.amount),0);

    getUpcomingStatements(data.creditCards||[], data.transactions, data.paidStatements||{}, 3),
    [data.creditCards, data.transactions, data.paidStatements]
  );

    const ps = {...(data.paidStatements||{})};

    save({...data, paidStatements:ps});
  };

    const next = salDay===14 ? 29 : 45;
    const bills = (data.bills||[]).filter(b=>{const d=Number(b.dueDay);return d>=salDay&&d<next;});

    const ccStatements = upcomingStatements.filter(s=>{
      const dd=s.dueDate.getDate();

    });

    return{bills,ccStatements,salInc};

    const t={...form,id:uid(),amount:Number(form.amount),incomeCategory:form.type==="income"?form.incomeCategory:undefined};

          </div>

            <div>
              <p style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",marginBottom:"12px"}}>Ilista ang iyong rental properties.</p>

                <div key={p.id} style={{display:"grid",gridTemplateColumns:"1fr 130px",gap:"8px",marginBottom:"8px"}}>
                  <input style={IS} placeholder="Property name" value={p.name} onChange={e=>{const r=[...sd.rentalProperties];r[i].name=e.target.value;setSd({...sd,rentalProperties:r});}}/>
                  <input style={IS} type="number" placeholder="Monthly rent" value={p.amount} onChange={e=>{const r=[...sd.rentalProperties];r[i].amount=e.target.value;setSd({...sd,rentalProperties:r});}}/>
                </div>

            </div>

                {["Bill name","Amount","Due day"].map(l=><span key={l} style={{fontSize:"10px",color:"rgba(255,255,255,0.35)",textAlign:"center"}}>{l}</span>)}
              </div>

                  <input style={IS} type="number" value={b.amount} onChange={e=>{const bl=[...sd.bills];bl[i].amount=e.target.value;setSd({...sd,bills:bl});}}/>

              ))}
              <button onClick={()=>{save({...data,creditCards:[...(data.creditCards||[]),{id:uid(),bank:"New Card",cardType:"VISA",cutOffDay:5,dueDay:25,color:CC_COLORS[(data.creditCards||[]).length%CC_COLORS.length],limit:""}]});setCcTab((data.creditCards||[]).length);}}
                style={{padding:"7px 13px",borderRadius:"20px",border:"1px dashed rgba(255,255,255,0.18)",background:"transparent",color:"rgba(255,255,255,0.38)",cursor:"pointer",fontSize:"12px",whiteSpace:"nowrap"}}>+ Add Card</button>
            </div>

            {(data.creditCards||[])[ccTab]&&(()=>{
              const cc=data.creditCards[ccTab];
              const curBal=getCurrentPeriodBalance(cc,data.transactions);
              const lim=Number(cc.limit||0);
              const util=lim>0?(curBal/lim*100):0;
              const statements=getCCStatements(cc,data.transactions,data.paidStatements||{},6);
              const unpaidStmts=statements.filter(s=>!s.paid);
              const totalUnpaid=unpaidStmts.reduce((s,x)=>s+x.statementBal,0);

              return(
                <div>
                  {/* Card visual */}
                  <div style={{background:`linear-gradient(135deg,${cc.color}cc,${cc.color}55)`,borderRadius:"18px",padding:"20px",marginBottom:"14px",border:`1px solid ${cc.color}66`,position:"relative",overflow:"hidden"}}>
                    <div style={{position:"absolute",top:"-15px",right:"-15px",width:"100px",height:"100px",borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
                    <div style={{position:"absolute",bottom:"-25px",left:"50px",width:"80px",height:"80px",borderRadius:"50%",background:"rgba(255,255,255,0.04)"}}/>
                    <div style={{fontSize:"12px",color:"rgba(255,255,255,0.7)",marginBottom:"4px"}}>{cc.bank}</div>
                    <div style={{fontSize:"20px",fontWeight:"700",marginBottom:"14px"}}>{cc.cardType}</div>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <div><div style={{fontSize:"9px",color:"rgba(255,255,255,0.6)"}}>Cut-off</div><div style={{fontSize:"15px",fontWeight:"600"}}>{cc.cutOffDay}th</div></div>
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:"9px",color:"rgba(255,255,255,0.6)"}}>Current Period</div>
                        <div style={{fontSize:"17px",fontWeight:"700"}}>{fp(curBal)}</div>
                        <div style={{fontSize:"9px",color:"rgba(255,255,255,0.5)"}}>(not yet due)</div>
                      </div>
                      <div style={{textAlign:"right"}}><div style={{fontSize:"9px",color:"rgba(255,255,255,0.6)"}}>Due Day</div><div style={{fontSize:"15px",fontWeight:"600"}}>{cc.dueDay}th</div></div>
                    </div>
                  </div>

                  {/* Unpaid total banner */}
                  {totalUnpaid>0&&(
                    <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"12px",padding:"12px 14px",marginBottom:"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:"11px",color:"#FCA5A5"}}>⚠️ Total Unpaid Statements</div>
                        <div style={{fontSize:"10px",color:"rgba(255,255,255,0.35)",marginTop:"2px"}}>{unpaidStmts.length} statement{unpaidStmts.length!==1?"s":""} pending</div>
                      </div>
                      <div style={{fontSize:"18px",fontWeight:"700",color:"#EF4444"}}>{fp(totalUnpaid)}</div>
                    </div>
                  )}

                  {lim>0&&(
                    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:"12px",padding:"13px",marginBottom:"12px",border:"1px solid rgba(255,255,255,0.06)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"7px"}}>
                        <span style={{fontSize:"12px",color:"rgba(255,255,255,0.45)"}}>Credit Utilization (current period)</span>
                        <span style={{fontSize:"12px",fontWeight:"600",color:util>70?"#EF4444":util>40?"#F59E0B":"#22C55E"}}>{util.toFixed(1)}%</span>
                      </div>
                      <div style={{height:"7px",background:"rgba(255,255,255,0.07)",borderRadius:"7px",overflow:"hidden"}}>
                        <div style={{width:`${Math.min(util,100)}%`,height:"100%",background:util>70?"#EF4444":util>40?"#F59E0B":"#22C55E",borderRadius:"7px"}}/>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:"5px"}}>
                        <span style={{fontSize:"10px",color:"rgba(255,255,255,0.28)"}}>Used: {fp(curBal)}</span>
                        <span style={{fontSize:"10px",color:"rgba(255,255,255,0.28)"}}>Limit: {fp(lim)}</span>
                      </div>
                    </div>
                  )}

                  {/* Statements list */}
                  <div style={{fontSize:"10px",color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"10px"}}>Statement History</div>
                  {statements.length===0
                    ?<div style={{textAlign:"center",padding:"18px",color:"rgba(255,255,255,0.18)",fontSize:"13px"}}>Wala pang charges sa card na ito.</div>
                    :statements.map(s=>{
                        const txnsInStmt=data.transactions.filter(t=>{
                          if(!t.isCC||t.ccId!==cc.id)return false;
                          const d=new Date(t.date);
                          return d>=s.windowStart&&d<=s.windowEnd;
                        });
                        return(
                          <div key={s.key} style={{background:s.paid?"rgba(34,197,94,0.06)":"rgba(255,255,255,0.04)",borderRadius:"14px",padding:"13px",marginBottom:"10px",border:`1px solid ${s.paid?"rgba(34,197,94,0.2)":"rgba(255,255,255,0.07)"}`}}>
                            {/* Statement header */}
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
                              <div>
                                <div style={{fontSize:"13px",fontWeight:"600"}}>
                                  Stmt closes {MONTHS[s.closeMonth]} {s.closeYear}
                                </div>
                                <div style={{fontSize:"10px",color:"rgba(255,255,255,0.35)",marginTop:"2px"}}>
                                  {fmtDate(s.windowStart)} - {fmtDate(s.windowEnd)}
                                </div>
                                <div style={{fontSize:"10px",color:"rgba(255,255,255,0.4)",marginTop:"2px"}}>
                                  Due: {fmtDate(s.dueDate)}
                                </div>
                              </div>
                              <div style={{textAlign:"right"}}>
                                <div style={{fontSize:"16px",fontWeight:"700",color:s.paid?"#22C55E":"#F97316"}}>{fp(s.statementBal)}</div>
                                <button onClick={()=>toggleStatementPaid(s.key)}
                                  style={{fontSize:"10px",background:s.paid?"rgba(239,68,68,0.15)":"rgba(34,197,94,0.15)",border:`1px solid ${s.paid?"rgba(239,68,68,0.3)":"rgba(34,197,94,0.3)"}`,color:s.paid?"#FCA5A5":"#4ADE80",borderRadius:"6px",padding:"3px 8px",cursor:"pointer",marginTop:"4px"}}>
                                  {s.paid?"✓ PAID -- Undo":"Mark as Paid ✓"}
                                </button>
                              </div>
                            </div>
                            {/* Transactions in this statement */}
                            {txnsInStmt.length>0&&(
                              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:"8px"}}>
                                {txnsInStmt.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=>{
                                  const cat=CATS.find(c=>c.id===t.category)||CATS[CATS.length-1];
                                  return(
                                    <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0"}}>
                                      <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                                        <span style={{fontSize:"14px"}}>{cat.icon}</span>
                                        <div>
                                          <div style={{fontSize:"12px"}}>{t.description}</div>
                                          <div style={{fontSize:"9px",color:"rgba(255,255,255,0.3)"}}>{t.date}</div>
                                        </div>
                                      </div>
                                      <div style={{fontSize:"12px",fontWeight:"600",color:"#F97316"}}>{fp(t.amount)}</div>
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        );
                      })
                  }

                  {/* Edit Card */}
                  <div style={{background:"rgba(255,255,255,0.04)",borderRadius:"12px",padding:"13px",marginBottom:"12px",border:"1px solid rgba(255,255,255,0.06)"}}>
                    <div style={{fontSize:"10px",color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"9px"}}>Edit Card</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px",marginBottom:"7px"}}>
                      {[["Bank","bank"],["Type","cardType"]].map(([label,key])=>(
                        <div key={key}><label style={{fontSize:"9px",color:"rgba(255,255,255,0.3)",display:"block",marginBottom:"3px"}}>{label}</label>
                          <input value={cc[key]} onChange={e=>{const cards=[...data.creditCards];cards[ccTab][key]=e.target.value;save({...data,creditCards:cards});}} style={{...IS,fontSize:"12px"}}/>
                        </div>
                      ))}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"7px",marginBottom:"9px"}}>
                      {[["Cut-off","cutOffDay"],["Due Day","dueDay"],["Limit","limit"]].map(([label,key])=>(
                        <div key={key}><label style={{fontSize:"9px",color:"rgba(255,255,255,0.3)",display:"block",marginBottom:"3px"}}>{label}</label>
                          <input type="number" value={cc[key]} onChange={e=>{const cards=[...data.creditCards];cards[ccTab][key]=e.target.value;save({...data,creditCards:cards});}} style={{...IS,fontSize:"12px"}}/>
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:"6px"}}>
                      {CC_COLORS.map(col=><button key={col} onClick={()=>{const cards=[...data.creditCards];cards[ccTab].color=col;save({...data,creditCards:cards});}} style={{width:"22px",height:"22px",borderRadius:"50%",background:col,border:cc.color===col?"2px solid white":"2px solid transparent",cursor:"pointer"}}/>)}
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* ── SETTINGS ── */}
        {view==="settings"&&(
          <div style={{paddingTop:"16px"}}>
            <h2 style={{fontSize:"17px",marginBottom:"6px"}}>⚙️ Settings</h2>
            <p style={{fontSize:"11px",color:"rgba(255,255,255,0.35)",marginBottom:"20px"}}>Ang iyong data at API key ay naka-save lang sa iyong browser. Hindi namin ito nakikita.</p>

            {/* API Key */}
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:"18px",padding:"18px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:"14px"}}>
              <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"12px"}}>🔑 Anthropic API Key</div>
              <p style={{fontSize:"12px",color:"rgba(255,255,255,0.45)",marginBottom:"12px",lineHeight:"1.6"}}>Kailangan ito para gumana ang <strong style={{color:"#C4B5FD"}}>✨ AI Financial Advice</strong>. Kunin ang key sa <strong style={{color:"#F472B6"}}>console.anthropic.com</strong> → API Keys.</p>
              {apiKey
                ?<div style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.25)",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:"12px",color:"#4ADE80",fontWeight:"600"}}>✅ API Key saved</div>
                    <div style={{fontSize:"10px",color:"rgba(255,255,255,0.35)",marginTop:"2px"}}>{apiKey.slice(0,14)}••••••••••••••</div>
                  </div>
                  <button onClick={()=>{setApiKey("");setKeyInput("");saveApiKey("");showToast("🗑️ Key removed");}} style={{fontSize:"11px",background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#FCA5A5",borderRadius:"7px",padding:"4px 10px",cursor:"pointer"}}>Remove</button>
                </div>
                :<div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px"}}>
                  <div style={{fontSize:"12px",color:"#FCA5A5"}}>⚠️ Walang API key -- hindi gagana ang AI advice</div>
                </div>
              }
              <label style={{fontSize:"10px",color:"rgba(255,255,255,0.38)",display:"block",marginBottom:"6px"}}>I-paste ang bagong API key:</label>
              <input type="password" placeholder="sk-ant-api03-..." value={keyInput} onChange={e=>setKeyInput(e.target.value)} style={{...IS,marginBottom:"10px"}}/>
              <button onClick={()=>{
                const k=keyInput.trim();
                if(!k){showToast("⚠️ Walang laman");return;}
                if(!k.startsWith("sk-ant")){showToast("⚠️ Mukhang hindi valid");return;}
                setApiKey(k);saveApiKey(k);showToast("✅ API key saved!");
              }} style={{width:"100%",padding:"12px",borderRadius:"11px",background:"linear-gradient(135deg,#7C3AED,#EC4899)",border:"none",color:"white",fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>💾 Save API Key</button>
            </div>

            {/* Bills Manager */}
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:"18px",padding:"18px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:"14px"}}>
              <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"12px"}}>📅 Mga Fixed Bills</div>
              {(data.bills||[]).map((bill,i)=>(
                <div key={bill.id} style={{display:"grid",gridTemplateColumns:"1fr 80px 55px 28px",gap:"6px",marginBottom:"7px",alignItems:"center"}}>
                  <input value={bill.name} onChange={e=>{const b=[...data.bills];b[i].name=e.target.value;save({...data,bills:b});}} style={{...IS,fontSize:"12px"}}/>
                  <input type="number" value={bill.amount} placeholder="Amount" onChange={e=>{const b=[...data.bills];b[i].amount=e.target.value;save({...data,bills:b});}} style={{...IS,fontSize:"12px"}}/>
                  <input type="number" value={bill.dueDay} placeholder="Day" min="1" max="31" onChange={e=>{const b=[...data.bills];b[i].dueDay=e.target.value;save({...data,bills:b});}} style={{...IS,fontSize:"12px"}}/>
                  <button onClick={()=>save({...data,bills:data.bills.filter((_,j)=>j!==i)})} style={{background:"none",border:"none",color:"rgba(255,255,255,0.25)",cursor:"pointer",fontSize:"18px",padding:0}}>×</button>
                </div>
              ))}
              <button onClick={()=>save({...data,bills:[...(data.bills||[]),{id:uid(),name:"",amount:"",dueDay:""}]})} style={{width:"100%",padding:"9px",borderRadius:"10px",background:"rgba(255,255,255,0.05)",border:"1px dashed rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.45)",cursor:"pointer",fontSize:"13px",marginTop:"4px"}}>+ Dagdag na Bill</button>
            </div>

            {/* Rental Properties */}
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:"18px",padding:"18px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:"14px"}}>
              <div style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"12px"}}>🏘️ Rental Properties</div>
              {(data.rentalProperties||[]).map((p,i)=>(
                <div key={p.id} style={{display:"grid",gridTemplateColumns:"1fr 120px 28px",gap:"6px",marginBottom:"7px",alignItems:"center"}}>
                  <input value={p.name} placeholder="Property name" onChange={e=>{const r=[...data.rentalProperties];r[i].name=e.target.value;save({...data,rentalProperties:r});}} style={{...IS,fontSize:"12px"}}/>
                  <input type="number" value={p.amount} placeholder="Monthly rent" onChange={e=>{const r=[...data.rentalProperties];r[i].amount=e.target.value;save({...data,rentalProperties:r});}} style={{...IS,fontSize:"12px"}}/>
                  <button onClick={()=>save({...data,rentalProperties:data.rentalProperties.filter((_,j)=>j!==i)})} style={{background:"none",border:"none",color:"rgba(255,255,255,0.25)",cursor:"pointer",fontSize:"18px",padding:0}}>×</button>
                </div>
              ))}
              <button onClick={()=>save({...data,rentalProperties:[...(data.rentalProperties||[]),{id:uid(),name:"",amount:""}]})} style={{width:"100%",padding:"9px",borderRadius:"10px",background:"rgba(255,255,255,0.05)",border:"1px dashed rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.45)",cursor:"pointer",fontSize:"13px",marginTop:"4px"}}>+ Dagdag na Property</button>
            </div>

            {/* Danger Zone */}
            <div style={{background:"rgba(239,68,68,0.06)",borderRadius:"18px",padding:"18px",border:"1px solid rgba(239,68,68,0.15)"}}>
              <div style={{fontSize:"11px",color:"#FCA5A5",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"10px"}}>⚠️ Danger Zone</div>
              <p style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",marginBottom:"12px"}}>I-clear ang lahat ng transactions. Hindi ito ma-undo.</p>
              <button onClick={()=>{if(window.confirm("Sure ka ba? Mabubura ang lahat ng transactions!")){save({...data,transactions:[],paidStatements:{}});showToast("🗑️ Cleared!");}}} style={{width:"100%",padding:"11px",borderRadius:"10px",background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#FCA5A5",cursor:"pointer",fontSize:"13px",fontWeight:"600"}}>🗑️ Clear All Transactions</button>
            </div>
          </div>
        )}

      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(9,9,16,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.06)",padding:"8px 0 18px"}}>
        <div style={{maxWidth:"600px",margin:"0 auto",display:"flex",justifyContent:"space-around"}}>
          {NAV.map(nav=>(
            <button key={nav.id} onClick={()=>setView(nav.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",padding:"4px 10px"}}>
              <span style={{fontSize:nav.id==="add"?"23px":"18px",opacity:view===nav.id?1:0.32}}>{nav.icon}</span>
              <span style={{fontSize:"9px",color:view===nav.id?"#F472B6":"rgba(255,255,255,0.38)",fontWeight:view===nav.id?"700":"400",letterSpacing:"0.3px"}}>{nav.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
